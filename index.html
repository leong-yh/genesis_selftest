<script type="text/babel">
function RadarChart({
  scores,
  axes,
  size = 280,
  fill = '#A8317B',
  stroke = '#A8317B',
  bg = '#F5DCEC',
  gridColor = 'rgba(168,49,123,0.18)',
  labelColor = '#3a2030',
  showLabels = true,
  animated = false,
}) {
  const cx = size / 2;
  const cy = size / 2;
  const r = size * 0.36;
  const n = 8;
  const max = 5;

  const pt = (idx, value) => {
    const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    const dist = (value / max) * r;
    return [cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist];
  };

  const rings = [1, 2, 3, 4, 5].map(v =>
    Array.from({ length: n }, (_, i) => pt(i, v)).map(p => p.join(',')).join(' ')
  );

  const spokes = Array.from({ length: n }, (_, i) => pt(i, max));
  const dataPts = scores.map((s, i) => pt(i, s));
  const dataPath = dataPts.map(p => p.join(',')).join(' ');

  const labelPts = axes.map((_, i) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const dist = r + 18;
    return [cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, angle];
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block', overflow: 'visible' }}>
      <circle cx={cx} cy={cy} r={r} fill={bg} opacity="0.35" />
      {rings.map((pts, i) => (
        <polygon key={i} points={pts} fill="none" stroke={gridColor} strokeWidth="1" />
      ))}
      {spokes.map(([x, y], i) => (
        <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={gridColor} strokeWidth="1" />
      ))}
      <polygon
        points={dataPath}
        fill={fill}
        fillOpacity="0.28"
        stroke={stroke}
        strokeWidth="2"
        strokeLinejoin="round"
        style={animated ? { transition: 'all 600ms cubic-bezier(0.4, 0, 0.2, 1)' } : {}}
      />
      {dataPts.map(([x, y], i) => (
        <circle key={i} cx={x} cy={y} r="3.5" fill={stroke} />
      ))}
      {showLabels && labelPts.map(([x, y, angle], i) => {
        const ax = Math.cos(angle);
        const anchor = Math.abs(ax) < 0.3 ? 'middle' : ax < 0 ? 'end' : 'start';
        return (
          <text
            key={i}
            x={x}
            y={y}
            textAnchor={anchor}
            dominantBaseline="middle"
            fontSize="11"
            fontWeight="500"
            fill={labelColor}
            fontFamily='-apple-system, "PingFang SC", "Microsoft YaHei", sans-serif'
          >
            {axes[i]}
          </text>
        );
      })}
    </svg>
  );
}

<script type="text/babel">
function useQuiz() {
  const key = window.__QUIZ_STORAGE_KEY || 'genesis-quiz-v1';

  const [state, setState] = React.useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { screen: 'intro', idx: 0, answers: {} };
  });

  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) {}
  }, [state, key]);

  const total = QUESTIONS.length;
  const totalScore = Object.values(state.answers).reduce((a, b) => a + (b || 0), 0);
  const levelFor = (score) => LEVELS.find(l => score >= l.range[0] && score <= l.range[1]) || LEVELS[0];
  const level = levelFor(totalScore);

  const start = () => setState(s => ({ ...s, screen: 'quiz', idx: 0 }));
  const answer = (qid, score) => {
    setState(s => {
      const nextIdx = s.idx + 1;
      const answers = { ...s.answers, [qid]: score };
      if (Object.keys(answers).length === total) {
        return { ...s, answers, screen: 'reveal', idx: total - 1 };
      }
      return { ...s, answers, idx: Math.min(nextIdx, total - 1) };
    });
  };
  const back = () => setState(s => ({ ...s, idx: Math.max(0, s.idx - 1), screen: 'quiz' }));
  const reset = () => setState({ screen: 'intro', idx: 0, answers: {} });
  const toResult = () => setState(s => ({ ...s, screen: 'result' }));

  return {
    ...state,
    total, totalScore, level,
    start, answer, back, reset, toResult,
  };
}

function scoreArray(answers) {
  return QUESTIONS.map(q => answers[q.id] || 0);
}

function axisArray() {
  return QUESTIONS.map(q => q.axis);
}

async function buildShareCard({ level, scores, totalScore, radarSvg }) {
  const W = 1080, H = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, level.color);
  grad.addColorStop(0.6, level.color);
  grad.addColorStop(1, '#2a0a1c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 8) {
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '500 28px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('GENESIS ACADEMY · 创世纪商学院', 80, 110);

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '500 32px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('影响力等级', W / 2, 260);

  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '700 320px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(`0${level.tier}`, W / 2, 560);

  ctx.fillStyle = '#fff';
  ctx.font = '700 100px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(level.title, W / 2, 720);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '400 36px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(level.subtitle, W / 2, 780);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2 - 60, 830); ctx.lineTo(W/2 + 60, 830); ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '700 64px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(`${totalScore} / 40 分`, W / 2, 920);

  if (radarSvg) {
    await new Promise((resolve) => {
      const blob = new Blob([radarSvg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, (W - 640) / 2, 1000, 640, 640);
        URL.revokeObjectURL(url);
        resolve();
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(); };
      img.src = url;
    });
  }

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '400 32px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  wrapText(ctx, level.summary, W / 2, 1720, W - 160, 48);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '400 26px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText('联系课程顾问 · 01126880217', W / 2, 1850);

  return new Promise((resolve) => canvas.toBlob(b => resolve(URL.createObjectURL(b)), 'image/png'));
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  const lines = [];
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
}

function svgToString(node) {
  if (!node) return '';
  const clone = node.cloneNode(true);
  if (!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  return new XMLSerializer().serializeToString(clone);
}

Object.assign(window, { useQuiz, scoreArray, axisArray, buildShareCard, svgToString });
</script>

function V1Question({ q, idx, total, onAnswer, onBack, selected }) {
  const pct = (idx / total) * 100;
  const [picked, setPicked] = React.useState(selected);
  const [pulse, setPulse] = React.useState(false);
  React.useEffect(() => { setPicked(selected); setPulse(false); }, [idx, selected]);

  const pick = (score) => {
    setPicked(score);
    setPulse(true);
    setTimeout(() => onAnswer(q.id, score), 520);
  };

  return (
    <div style={{
      height: '100%', width: '100%',
      background: `linear-gradient(180deg, ${v1.bg} 0%, ${v1.bg} 70%, rgba(168,49,123,0.05) 100%)`,
      display: 'flex', flexDirection: 'column', color: v1.ink,
      position: 'relative', overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, opacity: 0.06,
      }}>
        <BuildingBackdrop opacity={1} />
      </div>

      <div style={{ padding: '68px 24px 0', position: 'relative', zIndex: 2 }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 20,
        }}>
          <button onClick={onBack} disabled={idx === 0} style={{
            background: 'none', border: 'none', padding: 0,
            color: idx === 0 ? v1.line : v1.primary, cursor: idx === 0 ? 'default' : 'pointer',
            fontSize: 22, fontFamily: 'inherit',
          }}>←</button>
          <div style={{
            fontSize: 12, fontWeight: 600, letterSpacing: 1.5, color: v1.mute,
          }}>{String(idx+1).padStart(2,'0')} / {String(total).padStart(2,'0')}</div>
          <div style={{ width: 22 }} />
        </div>
        <div style={{
          height: 6, borderRadius: 3, background: v1.line, position: 'relative',
        }}>
          <div style={{
            height: '100%', width: `${pct}%`, background: `linear-gradient(90deg, ${v1.primary}, ${v1.primaryDeep})`,
            transition: 'width 600ms cubic-bezier(0.34, 1.56, 0.64, 1)',
            borderRadius: 3,
          }} />
          <div key={`bubble-${idx}-${pulse}`} style={{
            position: 'absolute', top: '50%', left: `${pct}%`,
            transform: 'translate(-50%, -50%)',
            width: 14, height: 14, borderRadius: '50%',
            background: v1.primary, border: '2px solid #fff',
            boxShadow: '0 2px 6px rgba(168,49,123,0.45)',
            transition: 'left 600ms cubic-bezier(0.34, 1.56, 0.64, 1)',
            animation: pulse ? 'bubblePulse 500ms ease-out' : 'none',
          }} />
        </div>
      </div>

      <div key={idx} style={{
        padding: '40px 24px 20px', flex: 1, display: 'flex', flexDirection: 'column',
        position: 'relative', zIndex: 2,
        animation: 'qFadeIn 400ms cubic-bezier(0.4, 0, 0.2, 1)',
      }}>
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: 2,
          color: v1.primary, marginBottom: 16,
        }}>问题 {idx + 1} · {q.axis}</div>
        <div style={{
          fontSize: 24, fontWeight: 600, lineHeight: 1.45,
          letterSpacing: -0.3, textWrap: 'pretty', marginBottom: 'auto',
        }}>{q.text}</div>

        <div style={{
          fontSize: 11, fontWeight: 500, color: v1.mute,
          marginTop: 32, marginBottom: 12, letterSpacing: 0.5,
          display: 'flex', justifyContent: 'space-between',
        }}>
          <span>完全没有</span><span>影响整个圈层</span>
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 18 }}>
          {SCALE.map((s) => {
            const active = picked === s.score;
            const intensity = s.score / 5;
            return (
              <button key={s.score} onClick={() => pick(s.score)} style={{
                flex: 1, padding: '20px 4px 14px', border: 'none',
                borderRadius: 14, cursor: 'pointer', fontFamily: 'inherit',
                background: active
                  ? `linear-gradient(180deg, ${v1.primary}, ${v1.primaryDeep})`
                  : `rgba(168,49,123,${0.04 + intensity * 0.05})`,
                color: active ? '#fff' : v1.ink,
                boxShadow: active ? '0 8px 24px rgba(168,49,123,0.35)' : 'none',
                transform: active ? 'translateY(-2px) scale(1.02)' : 'none',
                transition: 'all 200ms ease',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                animation: active && pulse ? 'answerPop 500ms ease-out' : 'none',
              }}>
                <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1 }}>{s.score}</div>
                <div style={{
                  fontSize: 10, fontWeight: 500, opacity: active ? 0.85 : 0.6,
                  textAlign: 'center', lineHeight: 1.2,
                }}>{s.label}</div>
              </button>
            );
          })}
        </div>
      </div>

      <style>{`
        @keyframes bubblePulse {
          0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(168,49,123,0.45); }
          50% { transform: translate(-50%, -50%) scale(1.8); box-shadow: 0 0 0 14px rgba(168,49,123,0); }
          100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 2px 6px rgba(168,49,123,0.45); }
        }
        @keyframes answerPop {
          0% { transform: translateY(-2px) scale(1.02); }
          40% { transform: translateY(-4px) scale(1.08); }
          100% { transform: translateY(-2px) scale(1.02); }
        }
        @keyframes qFadeIn {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

function V1Reveal({ onContinue, score, level }) {
  const [phase, setPhase] = React.useState(0);
  const [displayNum, setDisplayNum] = React.useState(0);

  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 900);
    return () => clearTimeout(t1);
  }, []);

  React.useEffect(() => {
    if (phase !== 1) return;
    const duration = 1200;
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - (1 - t) * (1 - t);
      setDisplayNum(Math.round(score * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
      else {
        setTimeout(() => setPhase(2), 400);
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [phase, score]);

  React.useEffect(() => {
    if (phase === 2) {
      const t = setTimeout(() => setPhase(3), 1100);
      return () => clearTimeout(t);
    }
  }, [phase]);

  return (
    <div style={{
      height: '100%', width: '100%',
      background: `radial-gradient(ellipse at top, ${level.color} 0%, ${v1.primaryDark} 100%)`,
      display: 'flex', flexDirection: 'column', justifyContent: 'center',
      alignItems: 'center', color: '#fff', padding: '60px 32px 40px', textAlign: 'center',
      position: 'relative', overflow: 'hidden',
    }}>
      <BuildingBackdrop opacity={0.08} />

      {phase === 0 && (
        <>
          <div style={{
            width: 80, height: 80, borderRadius: '50%',
            border: '2px solid rgba(255,255,255,0.2)',
            borderTopColor: '#fff',
            animation: 'v1spin 1.2s linear infinite',
            marginBottom: 30,
          }} />
          <div style={{
            fontSize: 13, letterSpacing: 3, color: 'rgba(255,255,255,0.6)', fontWeight: 600,
          }}>ANALYZING · 分析中</div>
        </>
      )}

      {phase >= 1 && (
        <div style={{
          position: phase >= 2 ? 'absolute' : 'relative',
          top: phase >= 2 ? 80 : 'auto',
          transform: phase >= 2 ? 'scale(0.5)' : 'none',
          opacity: phase >= 2 ? 0.5 : 1,
          transition: 'all 700ms cubic-bezier(0.4, 0, 0.2, 1)',
          zIndex: 2,
        }}>
          <div style={{
            fontSize: 13, letterSpacing: 3, color: 'rgba(255,255,255,0.55)',
            fontWeight: 600, marginBottom: 16,
          }}>YOUR SCORE · 你的总分</div>
          <div style={{
            fontSize: 120, fontWeight: 800, lineHeight: 1, letterSpacing: -4,
            fontVariantNumeric: 'tabular-nums',
            textShadow: '0 4px 20px rgba(0,0,0,0.3)',
          }}>{displayNum}</div>
          <div style={{
            fontSize: 18, color: 'rgba(255,255,255,0.5)', marginTop: 8, letterSpacing: 1,
          }}>/ 40 分</div>
        </div>
      )}

      {phase >= 2 && (
        <div style={{ perspective: 1200, marginTop: 60 }}>
          <div style={{
            width: 280, padding: '30px 24px',
            background: `linear-gradient(160deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06))`,
            backdropFilter: 'blur(20px)',
            WebkitBackdropFilter: 'blur(20px)',
            border: '1px solid rgba(255,255,255,0.2)',
            borderRadius: 20,
            boxShadow: '0 24px 60px rgba(0,0,0,0.45)',
            animation: 'cardFlipIn 1000ms cubic-bezier(0.4, 0, 0.2, 1) forwards',
          }}>
            <div style={{
              fontSize: 11, letterSpacing: 3, color: 'rgba(255,255,255,0.55)',
              fontWeight: 700, marginBottom: 10,
            }}>你的影响力等级</div>
            <div style={{
              fontSize: 72, fontWeight: 800, lineHeight: 1, letterSpacing: -2,
              color: '#fff', marginBottom: 10,
              textShadow: '0 4px 20px rgba(0,0,0,0.3)',
            }}>0{level.tier}</div>
            <div style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1.2,
              marginBottom: 4, color: '#fff',
            }}>{level.title}</div>
            <div style={{
              fontSize: 12, color: 'rgba(255,255,255,0.6)', letterSpacing: 2,
            }}>{level.subtitle.toUpperCase()}</div>
            <div style={{
              display: 'flex', gap: 6, marginTop: 20, justifyContent: 'center',
            }}>
              {[1,2,3,4].map(n => (
                <div key={n} style={{
                  width: n === level.tier ? 28 : 8, height: 8, borderRadius: 4,
                  background: n <= level.tier ? '#fff' : 'rgba(255,255,255,0.25)',
                  transition: 'all 400ms',
                }} />
              ))}
            </div>
          </div>
        </div>
      )}

      {phase >= 3 && (
        <div style={{
          marginTop: 36, position: 'relative', zIndex: 2,
          animation: 'ctaFadeIn 500ms ease-out',
        }}>
          <button onClick={onContinue} style={{
            padding: '16px 36px', border: 'none', borderRadius: 100,
            background: '#fff', color: v1.primaryDeep,
            fontSize: 16, fontWeight: 700, fontFamily: 'inherit', cursor: 'pointer',
            boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
          }}>查看详细解析 →</button>
        </div>
      )}

      <style>{`
        @keyframes v1spin { to { transform: rotate(360deg); } }
        @keyframes cardFlipIn {
          0% { transform: rotateY(-90deg) scale(0.8); opacity: 0; }
          60% { transform: rotateY(10deg) scale(1.02); opacity: 1; }
          100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }
        @keyframes ctaFadeIn {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

function V1Result({ answers, totalScore, level, onRestart }) {
  const radarRef = React.useRef(null);
  const [downloading, setDownloading] = React.useState(false);
  const scores = scoreArray(answers);
  const axes = axisArray();
  const tierColor = level.color;

  const onDownload = async () => {
    if (downloading) return;
    setDownloading(true);
    try {
      const svgStr = svgToString(radarRef.current);
      const url = await buildShareCard({ level, scores, totalScore, radarSvg: svgStr });
      const a = document.createElement('a');
      a.href = url;
      a.download = `genesis-influence-level-${level.tier}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } finally {
      setDownloading(false);
    }
  };

  return (
    <div style={{
      height: '100%', width: '100%', overflow: 'auto',
      background: v1.bg, color: v1.ink,
    }}>
      <div style={{
        background: `linear-gradient(160deg, ${tierColor} 0%, ${v1.primaryDark} 100%)`,
        color: '#fff', padding: '68px 24px 36px',
        position: 'relative', overflow: 'hidden',
      }}>
        <BuildingBackdrop opacity={0.12} />
        <div style={{
          position: 'absolute', top: -60, right: -40,
          width: 220, height: 220, borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%)',
        }} />
        <div style={{ position: 'relative', zIndex: 2 }}>
          <div style={{
            fontSize: 11, letterSpacing: 2, color: 'rgba(255,255,255,0.6)',
            marginTop: 8, marginBottom: 10,
          }}>你的影响力等级</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 4 }}>
            <div style={{ fontSize: 80, fontWeight: 800, lineHeight: 1, letterSpacing: -2 }}>0{level.tier}</div>
            <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.6)' }}>/ 04</div>
          </div>
          <div style={{ fontSize: 32, fontWeight: 700, lineHeight: 1.2, marginBottom: 4 }}>{level.title}</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.65)', letterSpacing: 1.5, marginBottom: 20 }}>{level.subtitle.toUpperCase()}</div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 10,
            padding: '8px 14px', borderRadius: 100,
            background: 'rgba(255,255,255,0.15)',
            border: '1px solid rgba(255,255,255,0.25)',
            fontSize: 13, fontWeight: 600,
          }}>
            <span style={{ fontSize: 22, fontWeight: 800 }}>{totalScore}</span>
            <span style={{ opacity: 0.6 }}>/ 40 分</span>
          </div>
          <div style={{ fontSize: 14, lineHeight: 1.65, marginTop: 24, color: 'rgba(255,255,255,0.88)', textWrap: 'pretty' }}>
            {level.summary}
          </div>
        </div>
      </div>

      <div style={{ padding: '32px 24px 8px' }}>
        <div style={{ fontSize: 11, letterSpacing: 2, color: v1.mute, marginBottom: 4 }}>8 维度分布</div>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>你的影响力图谱</div>
        <div style={{
          background: '#fff', borderRadius: 20, padding: '20px 10px',
          boxShadow: '0 4px 16px rgba(168,49,123,0.06)',
          display: 'flex', justifyContent: 'center',
        }}>
          <div ref={radarRef} style={{ display: 'inline-block' }}>
            <RadarChart scores={scores} axes={axes} size={300}
              fill={tierColor} stroke={tierColor} bg={level.accent}
              labelColor={v1.ink} animated
            />
          </div>
        </div>
      </div>

      <div style={{ padding: '28px 24px 0' }}>
        <div style={{
          padding: '20px 22px', borderRadius: 16,
          background: '#fff', border: `1px solid ${v1.line}`,
        }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: tierColor, marginBottom: 8, fontWeight: 700 }}>💡 给你的洞察</div>
          <div style={{ fontSize: 15, lineHeight: 1.65, marginBottom: 14, textWrap: 'pretty' }}>{level.insight}</div>
          <div style={{
            padding: 14, borderRadius: 10, background: level.accent, opacity: 0.9,
            fontSize: 13, fontWeight: 600, color: tierColor, lineHeight: 1.5,
          }}>下一步 · {level.action}</div>
        </div>
      </div>

      <div style={{ padding: '24px 24px 0' }}>
        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>各维度得分</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {QUESTIONS.map((q, i) => {
            const s = answers[q.id] || 0;
            return (
              <div key={q.id} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '10px 14px', background: '#fff', borderRadius: 10,
                border: `1px solid ${v1.line}`,
              }}>
                <div style={{ fontSize: 11, color: v1.mute, width: 20 }}>{String(i+1).padStart(2, '0')}</div>
                <div style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{q.short}</div>
                <div style={{ display: 'flex', gap: 3 }}>
                  {[1,2,3,4,5].map(n => (
                    <div key={n} style={{
                      width: 8, height: 8, borderRadius: '50%',
                      background: n <= s ? tierColor : v1.line,
                    }} />
                  ))}
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, color: tierColor, width: 20, textAlign: 'right' }}>{s}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ padding: '32px 24px 40px' }}>
        <div style={{
          padding: '24px 22px', borderRadius: 18,
          background: `linear-gradient(160deg, ${tierColor} 0%, ${v1.primaryDark} 100%)`,
          color: '#fff', position: 'relative', overflow: 'hidden',
        }}>
          <BuildingBackdrop opacity={0.1} />
          <div style={{ position: 'relative', zIndex: 2 }}>
            <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.6, marginBottom: 8, fontWeight: 700 }}>NEXT STEP</div>
            <div style={{ fontSize: 19, fontWeight: 700, lineHeight: 1.4, marginBottom: 8 }}>想突破到下一个层次?</div>
            <div style={{ fontSize: 13, opacity: 0.8, lineHeight: 1.6, marginBottom: 18 }}>课程顾问会根据你的测评结果,为你规划个人化的品牌升级路径。</div>

            <a href={META.cta.whatsapp} target="_blank" rel="noopener" style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
              padding: '16px 20px', borderRadius: 100,
              background: '#25D366', color: '#fff',
              fontSize: 15, fontWeight: 700, textDecoration: 'none',
              marginBottom: 10, fontFamily: 'inherit',
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.966-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.226 1.36.194 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.465 3.488"/></svg>
              WhatsApp · +60 {META.cta.phone}
            </a>
            <button onClick={onDownload} disabled={downloading} style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
              width: '100%', padding: '14px 20px', borderRadius: 100,
              background: 'rgba(255,255,255,0.12)', color: '#fff',
              border: '1px solid rgba(255,255,255,0.25)',
              fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
            }}>
              {downloading ? '生成中…' : '📥 下载成果卡 PNG'}
            </button>
          </div>
        </div>

        <button onClick={onRestart} style={{
          marginTop: 14, width: '100%', padding: 12, border: 'none',
          background: 'none', color: v1.mute, fontSize: 13,
          cursor: 'pointer', fontFamily: 'inherit',
        }}>重新测试</button>
      </div>
    </div>
  );
}

function V1App() {
  const q = useQuiz();
  const cur = QUESTIONS[q.idx];
  return (
    <>
      {q.screen === 'intro' && <V1Intro onStart={q.start} />}
      {q.screen === 'quiz' && (
        <V1Question
          q={cur} idx={q.idx} total={q.total}
          onAnswer={q.answer} onBack={q.back}
          selected={q.answers[cur.id]}
        />
      )}
      {q.screen === 'reveal' && (
        <V1Reveal score={q.totalScore} level={q.level} onContinue={q.toResult} />
      )}
      {q.screen === 'result' && (
        <V1Result answers={q.answers} totalScore={q.totalScore} level={q.level} onRestart={q.reset} />
      )}
    </>
  );
}

window.V1App = V1App;
</script>

        <div style={{

        <div style={{

      </div>

ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>
